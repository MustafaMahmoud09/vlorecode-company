<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vloracode Facebook Cover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .cover-container {
            width: 1200px;
            height: 630px;
            position: relative;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .cover-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
        }
        
        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 6s ease-in-out infinite;
        }
        
        .shape1 {
            width: 200px;
            height: 200px;
            top: -50px;
            right: -50px;
            animation-delay: 0s;
        }
        
        .shape2 {
            width: 150px;
            height: 150px;
            bottom: 50px;
            left: -30px;
            animation-delay: 2s;
        }
        
        .shape3 {
            width: 100px;
            height: 100px;
            top: 50%;
            left: 20%;
            animation-delay: 4s;
        }
        
        .shape4 {
            width: 80px;
            height: 80px;
            bottom: 100px;
            right: 200px;
            animation-delay: 1s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .cover-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 60px;
            color: white;
        }
        
        .company-logo {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .cover-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            max-width: 600px;
        }
        
        .cover-subtitle {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.5;
        }
        
        .cta-button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .cta-button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .tech-icons {
            position: absolute;
            bottom: 40px;
            right: 60px;
            display: flex;
            gap: 20px;
        }
        
        .tech-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .download-section {
            margin-top: 30px;
            text-align: center;
        }
        
        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .cover-container {
                width: 100%;
                max-width: 600px;
                height: 315px;
            }
            
            .cover-content {
                padding: 30px;
            }
            
            .logo-text {
                font-size: 24px;
            }
            
            .cover-title {
                font-size: 28px;
            }
            
            .cover-subtitle {
                font-size: 16px;
            }
            
            .tech-icons {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="cover-container" id="cover">
        <div class="floating-shapes">
            <div class="shape shape1"></div>
            <div class="shape shape2"></div>
            <div class="shape shape3"></div>
            <div class="shape shape4"></div>
        </div>
        
        <div class="cover-content">
            <div class="company-logo">
                <div class="logo-icon">V</div>
                <div class="logo-text">Vloracode</div>
            </div>
            
            <h1 class="cover-title">Transform Your Ideas Into Digital Reality</h1>
            <p class="cover-subtitle">Professional Web Development & Digital Solutions</p>
            
            <a href="#" class="cta-button">Get Started Today</a>
        </div>
        
        <div class="tech-icons">
            <div class="tech-icon">⚛️</div>
            <div class="tech-icon">🎨</div>
            <div class="tech-icon">📱</div>
            <div class="tech-icon">🚀</div>
        </div>
    </div>
    
    <div class="download-section">
        <button class="download-btn" onclick="downloadCover()">Download as Image</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function downloadCover() {
            const cover = document.getElementById('cover');
            
            html2canvas(cover, {
                scale: 2,
                backgroundColor: null,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'vloracode-facebook-cover.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
